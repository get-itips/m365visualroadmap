<link rel="stylesheet" href="/assets/d3-milestones/d3-milestones.css">
<script src="/assets/d3-milestones/d3-milestones.min.js"></script>

<div id="timeline"></div>

<script>
  milestones('#timeline')
	.optimize('true')
	.autoResize('false')
	.urlTarget('_blank')
	.distribution('top-bottom')
    .mapping({
      'timestamp': 'date',
      'text': 'title',
	  'url': 'url'
    })
    .parseTime('%B.%Y')
    .aggregateBy('month')
    .render([
	
	

{ date: "September.2026", title:"Windows 365: Windows 365 Link  - Market Expansion", url:'https://www.microsoft.com/microsoft-365/roadmap?searchterms=558253', textStyle: {"font-weight": "bold"} } , 
{ date: "April.2026", title:"Windows 365: Windows 365 Link - Customization of the login screen", url:'https://www.microsoft.com/microsoft-365/roadmap?searchterms=546245', textStyle: {"font-weight": "bold"} } , 
{ date: "December.2025", title:"Windows 365: Frontline in Shared mode  availability for Switzerland North, Switzerland West, Norway East, Norway East, Norway West, UAE central, UAE north", url:'https://www.microsoft.com/microsoft-365/roadmap?searchterms=495263'} , 
{ date: "July.2025", title:"Windows 365: Frontline in Shared mode availability for Germany West Central, Korea Central, Korea South", url:'https://www.microsoft.com/microsoft-365/roadmap?searchterms=495262'} , 
{ date: "June.2025", title:"Windows 365: Concurrency assignment for Windows 365 Frontline in dedicated mode", url:'https://www.microsoft.com/microsoft-365/roadmap?searchterms=473454'} , 
{ date: "June.2025", title:"Windows 365: Available from New Zealand North", url:'https://www.microsoft.com/microsoft-365/roadmap?searchterms=481149'} , 
{ date: "May.2025", title:"Windows 365: Resize is enabled for Windows 365 Frontline Cloud PCs", url:'https://www.microsoft.com/microsoft-365/roadmap?searchterms=475246'}
    ]);</script>
